<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Epoxya</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Archivo:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;color:#f0f0f0;font-family:'Archivo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
    .code{font-family:'Space Grotesk',sans-serif;font-size:8rem;font-weight:700;color:#00e5cc;line-height:1;margin-bottom:16px;text-shadow:0 0 60px rgba(0,229,204,0.3)}
    h1{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;margin-bottom:12px}
    p{color:#888;font-size:1rem;margin-bottom:32px;max-width:400px}
    a{background:#00e5cc;color:#000;padding:14px 32px;border-radius:12px;font-weight:700;text-decoration:none;transition:box-shadow .3s}
    a:hover{box-shadow:0 0 30px rgba(0,229,204,0.4)}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
  <a href="index.html">Retour à l'accueil</a>
</body>
</html>
